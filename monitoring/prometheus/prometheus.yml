# ══════════════════════════════════════════════════════════════════════════════
# Prometheus Configuration
# BTEC Unit 6: Networking in the Cloud
#
# Prometheus scrapes metrics from:
#   - service-1 (ERP) on port 3001/metrics
#   - service-2 (CRM/WMS) on port 3002/metrics
#   - Nginx on port 80/nginx-status (via nginx_exporter)
#   - Node Exporter for host OS metrics (CPU, memory, disk)
#   - Prometheus itself (self-monitoring)
# ══════════════════════════════════════════════════════════════════════════════

global:
  scrape_interval:     15s   # How often to collect metrics
  evaluation_interval: 15s   # How often to evaluate alerting rules
  scrape_timeout:      10s

  # Labels applied to all metrics for identification
  external_labels:
    environment: 'btec-unit6-demo'
    project:     'cloud-networking'

# ── Alerting (optional — connects to Alertmanager) ───────────────────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# ── Scrape Configurations ─────────────────────────────────────────────────────
scrape_configs:

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          subnet:  'monitoring'

  # ERP Service 1
  - job_name: 'erp-service-1'
    scrape_interval: 10s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['service-1:3001']
        labels:
          service:     'ERP-Service-1'
          service_type: 'erp'
          subnet:       'private-subnet-a'

  # CRM/WMS Service 2
  - job_name: 'crm-wms-service-2'
    scrape_interval: 10s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['service-2:3002']
        labels:
          service:     'CRM-WMS-Service-2'
          service_type: 'crm-wms'
          subnet:       'private-subnet-b'

  # Node Exporter (host OS metrics: CPU, memory, disk, network)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'host-os'
          subnet:  'monitoring'

  # cAdvisor (Docker container metrics)
  - job_name: 'cadvisor'
    scrape_interval: 15s
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'docker-containers'
          subnet:  'monitoring'
