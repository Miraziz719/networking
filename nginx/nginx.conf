# ══════════════════════════════════════════════════════════════════════════════
# Nginx — Load Balancer / Reverse Proxy Configuration
# BTEC Unit 6: Networking in the Cloud
#
# Architecture role:
#   - Sits in the PUBLIC SUBNET
#   - Receives all external traffic on port 80 (and 443 with SSL)
#   - Distributes requests to backend services in PRIVATE SUBNETS
#   - Acts as a reverse proxy (clients never connect directly to backends)
#   - Performs health checks on upstream nodes
# ══════════════════════════════════════════════════════════════════════════════

# Worker processes — set to auto to use all CPU cores
worker_processes auto;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream="$upstream_addr" rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain application/json application/javascript text/css;

    # ── Rate Limiting (simulates firewall/security group rules) ───────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # ══════════════════════════════════════════════════════════════════════
    # UPSTREAM BLOCK — Backend Services (Private Subnet)
    #
    # Round-robin is the default algorithm in Nginx.
    # Each request is forwarded to the next server in turn.
    # This is HORIZONTAL SCALING in action.
    # ══════════════════════════════════════════════════════════════════════
    # Docker internal DNS — re-resolves on every request (handles container restarts)
    resolver 127.0.0.11 valid=5s ipv6=off;

    upstream backend_services {
        server service-1:3001 max_fails=3 fail_timeout=30s;
        server service-2:3002 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream service1_direct {
        server service-1:3001;
    }
    upstream service2_direct {
        server service-2:3002;
    }

    # ══════════════════════════════════════════════════════════════════════
    # MAIN SERVER BLOCK — Public-facing HTTP (port 80)
    # ══════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name _;

        # ── Security headers (simulates WAF / Security Group rules) ───────
        add_header X-Frame-Options        "SAMEORIGIN"          always;
        add_header X-Content-Type-Options "nosniff"             always;
        add_header X-XSS-Protection       "1; mode=block"       always;
        add_header Referrer-Policy        "strict-origin"       always;
        add_header X-Load-Balancer        "nginx-round-robin"   always;
        add_header X-BTEC-Demo            "Unit6-CloudNetworking" always;

        # ── Frontend Dashboard ────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend:80;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Main API — Load Balanced Endpoint ────────────────────────────
        # All requests to /api/ are distributed across both backend services
        # Nginx round-robin sends alternate requests to service-1 and service-2
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass         http://backend_services/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeout settings
            proxy_connect_timeout  5s;
            proxy_send_timeout     10s;
            proxy_read_timeout     10s;

            # Retry on failure (high availability)
            proxy_next_upstream error timeout http_502 http_503 http_504;

            # CORS headers for frontend
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        }

        # ── Individual Health Check Endpoints ────────────────────────────
        # These route directly to each service for health monitoring
        location /health/service1 {
            proxy_pass http://service1_direct/health;
            proxy_set_header Host $host;
        }
        location /health/service2 {
            proxy_pass http://service2_direct/health;
            proxy_set_header Host $host;
        }

        # ── Nginx Status (for Prometheus scraping) ────────────────────────
        location /nginx-status {
            stub_status on;
            allow 172.16.0.0/12;   # Docker internal network
            allow 10.0.0.0/8;      # VPC internal
            deny all;              # Block external access
        }

        # ── Metrics passthrough to services ──────────────────────────────
        location /metrics/service1 {
            proxy_pass http://service1_direct/metrics;
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            deny all;
        }
        location /metrics/service2 {
            proxy_pass http://service2_direct/metrics;
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            deny all;
        }

        # ── Grafana proxy ─────────────────────────────────────────────────
        # Uses variable so nginx resolves at request time, not at startup.
        # This allows the basic stack to run without the monitoring stack.
        location /grafana/ {
            resolver 127.0.0.11 valid=30s;
            set $grafana_backend http://grafana:3000;
            proxy_pass $grafana_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── 404 handler ───────────────────────────────────────────────────
        error_page 404 /404.json;
        location = /404.json {
            return 404 '{"error":"Not found","service":"nginx-lb"}';
            add_header Content-Type application/json;
        }
    }
}
