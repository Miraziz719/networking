# ══════════════════════════════════════════════════════════════════════════════
# Nginx SSL / HTTPS Configuration
# BTEC Unit 6: Networking in the Cloud
#
# Use this config for production deployment with a real domain.
# Certificates can be obtained via Let's Encrypt (Certbot):
#   certbot --nginx -d yourdomain.com
# ══════════════════════════════════════════════════════════════════════════════

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Upstream backend services (same as HTTP config)
    upstream backend_services {
        server service-1:3001 max_fails=3 fail_timeout=30s;
        server service-2:3002 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── HTTP → HTTPS Redirect ─────────────────────────────────────────────
    server {
        listen 80;
        server_name yourdomain.com www.yourdomain.com;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS Server ──────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name yourdomain.com www.yourdomain.com;

        # SSL certificate paths (replace with your cert paths)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Modern SSL settings (TLS 1.2 + 1.3 only)
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       10m;

        # HSTS — tells browsers to always use HTTPS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options        "SAMEORIGIN"  always;
        add_header X-Content-Type-Options "nosniff"     always;

        # Frontend
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Load-balanced API
        location /api/ {
            proxy_pass http://backend_services/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_next_upstream error timeout http_502 http_503;
        }
    }
}
